# Netlify — Frontend (React / Vite)
# Set in Netlify UI → Site settings → Environment variables:
#   VITE_API_BASE_URL=https://YOUR-RENDER-SERVICE.onrender.com/api

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router — serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
