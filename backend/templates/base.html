{% load static %}
<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SSB Connect{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { 900: '#071a33', 800: '#0a2545', 700: '#123a63' },
            olive: { 700: '#516329', 600: '#647832', 500: '#7f9344' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-100 text-slate-950 antialiased dark:bg-slate-950 dark:text-slate-100">
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur dark:border-slate-800 dark:bg-navy-900/95">
    <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
      <a href="{% url 'home' %}" class="flex items-center gap-3 font-bold">
        <span class="grid h-9 w-9 place-items-center rounded bg-navy-900 text-white ring-2 ring-olive-500">SC</span>
        <span>SSB Connect</span>
      </a>
      <div class="hidden items-center gap-1 text-sm font-medium md:flex">
        <a class="nav-link" href="{% url 'home' %}">Home</a>
        <a class="nav-link" href="{% url 'create-post' %}">Feed</a>
        <a class="nav-link" href="{% url 'chat-list' %}">Chat</a>
        <a class="nav-link" href="{% url 'group-list' %}">Groups</a>
        <a class="nav-link" href="{% url 'notes-list' %}">Notes</a>
        <a class="nav-link" href="{% url 'events-page' %}">Events</a>
        <a class="nav-link" href="{% url 'my-profile' %}">Profile</a>
        <a class="nav-link" href="{% url 'settings-page' %}">Settings</a>
      </div>
      <button class="icon-button" data-theme-toggle type="button" aria-label="Toggle dark mode">◐</button>
    </nav>
  </header>

  <div class="mx-auto grid max-w-7xl gap-5 px-4 py-5 lg:grid-cols-[240px_minmax(0,1fr)]">
    <aside class="hidden rounded border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-900 lg:block">
      <nav class="grid gap-1 text-sm">
        <a class="side-link" href="{% url 'home' %}">Dashboard</a>
        <a class="side-link" href="{% url 'ppdt' %}">SSB Practice</a>
        <a class="side-link" href="/api/posts/?post_type=CURRENT_AFFAIRS">Current Affairs</a>
        <a class="side-link" href="{% url 'group-list' %}">Study Groups</a>
        <a class="side-link" href="#">Fitness</a>
      </nav>
    </aside>

    <main class="min-w-0">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
