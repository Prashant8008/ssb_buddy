{% extends "base.html" %}
{% block title %}Login | SSB Connect{% endblock %}
{% block content %}
<section class="mx-auto max-w-md card p-6">
  <h1 class="text-2xl font-bold">Login</h1>
  <form class="mt-5 space-y-4" data-api-form="/api/auth/token/">
    <input class="field" name="username" placeholder="Username">
    <input class="field" name="password" type="password" placeholder="Password">
    <button class="btn-primary w-full" type="submit">Login</button>
    <p class="text-sm text-slate-500" data-form-status></p>
  </form>
  <a class="mt-4 block text-sm font-semibold text-navy-700 dark:text-white" href="{% url 'forgot-password-page' %}">Forgot password?</a>
</section>
{% endblock %}
