{% extends "base.html" %}
{% block title %}Forgot Password | SSB Connect{% endblock %}
{% block content %}
<section class="mx-auto max-w-md card p-6">
  <h1 class="text-2xl font-bold">Reset Password</h1>
  <form class="mt-5 space-y-4" method="post" action="{% url 'password_reset' %}">
    {% csrf_token %}
    <input class="field" name="email" type="email" placeholder="Email address">
    <button class="btn-primary w-full" type="submit">Send Reset Link</button>
  </form>
</section>
{% endblock %}
