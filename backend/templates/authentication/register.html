{% extends "base.html" %}
{% block title %}Register | SSB Connect{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl card p-6">
  <h1 class="text-2xl font-bold">Create Account</h1>
  <form class="mt-5 grid gap-4 md:grid-cols-2" data-api-form="/api/auth/register/">
    <input class="field" name="first_name" placeholder="First name">
    <input class="field" name="last_name" placeholder="Last name">
    <input class="field md:col-span-2" name="username" placeholder="Username">
    <input class="field md:col-span-2" name="email" type="email" placeholder="Email">
    <input class="field" name="password" type="password" placeholder="Password">
    <button class="btn-primary" type="submit">Register</button>
    <p class="text-sm text-slate-500 md:col-span-2" data-form-status></p>
  </form>
</section>
{% endblock %}
