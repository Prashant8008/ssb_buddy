# Fly.io app for SSB Connect Django API.
# First deploy: fly launch (or connect GitHub with working directory = backend)
# Set secrets before deploy — see .env.example

app = 'ssb-buddy-api'
primary_region = 'bom'

[build]

[env]
  DJANGO_SETTINGS_MODULE = 'config.settings.production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  release_command = 'python manage.py migrate --noinput'
