# Render Blueprint — Backend (Django API)
# Dashboard: New → Blueprint → connect this repo
# Frontend: deploy separately on Netlify or Vercel (see README)

databases:
  - name: ssb-connect-db
    plan: free
    databaseName: ssb_connect
    user: ssb_connect

services:
  - type: redis
    name: ssb-connect-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: ssb-connect-api
    runtime: python
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ssb-connect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ssb-connect-redis
          property: connectionString
      - key: CHANNEL_LAYER_BACKEND
        value: channels_redis.core.RedisChannelLayer
      - key: ALLOWED_HOSTS
        value: .onrender.com
      # Set after Netlify/Vercel deploy (comma-separated https URLs):
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # MongoDB Atlas (required for feed):
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: ssb_connect_feed
      # Optional:
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
